name: release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: set-version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.sha }}"
            echo "version=dev-${SHA::8}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=dev-${SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          BIN_NAME="t-porkbun-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "dist/${BIN_NAME}" .

      - name: package
        run: |
          mkdir -p artifacts
          BASE="t-porkbun-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp "dist/${BASE}.exe" "artifacts/${BASE}.exe"
            cd artifacts
            zip "${BASE}.zip" "${BASE}.exe"
          else
            cp "dist/${BASE}" "artifacts/${BASE}"
            cd artifacts
            tar -czf "${BASE}.tar.gz" "${BASE}"
          fi

      - name: upload-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: download-artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: set-version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.sha }}"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "tag=dev-${SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: publish-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: release-artifacts/*
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
